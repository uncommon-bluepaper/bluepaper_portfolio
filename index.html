  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #f8f5ef;
      --bg-card:   #fdfbf7;
      --bg-soft:   #f0ece3;
      --border:    #e0d9ce;
      --text:      #1c1c1a;
      --text-mid:  #4a4a46;
      --text-muted:#9a9590;
      --blue:      #7aaed6;
      --blue-lt:   #ddeef8;
      --blue-dim:  #5a90be;
      --blue-dark: #2a4a62;
      --font-serif:'Libre Baskerville', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --font-sans: 'Noto Sans KR', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-weight: 300; -webkit-font-smoothing: antialiased; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px; padding: 0 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(248,245,239,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--blue-dim); }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--blue-dim); }

    .hero { max-width: 1080px; margin: 0 auto; padding: 152px 60px 88px; }
    .hero-eyebrow { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--blue-dim); margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
    .hero-eyebrow::after { content: ''; display: block; width: 36px; height: 1px; background: var(--blue); }
    .hero-title { font-family: var(--font-serif); font-size: clamp(3.6rem, 6.5vw, 6rem); font-weight: 400; line-height: 1; letter-spacing: -0.03em; color: var(--text); margin-bottom: 10px; }
    .hero-title em { font-style: italic; color: var(--blue-dim); }
    .hero-sub { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 52px; }
    .hero-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 36px; }
    .hero-bottom { display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; }
    .hero-desc { font-size: 0.87rem; line-height: 2; color: var(--text-mid); max-width: 380px; }
    .hero-stats { display: flex; gap: 44px; flex-shrink: 0; }
    .stat { text-align: right; }
    .stat-num { font-family: var(--font-serif); font-size: 2rem; font-style: italic; color: var(--blue-dim); line-height: 1; }
    .stat-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

    .section-wrap { max-width: 1080px; margin: 0 auto; padding: 0 60px 100px; }
    .sec-head { display: flex; align-items: center; margin-bottom: 36px; }
    .sec-title { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--text-muted); }
    .sec-line { flex: 1; height: 1px; background: var(--border); margin: 0 20px; }
    .sec-count { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--text-muted); }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 44px; flex-wrap: wrap; }
    .filter-btn { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 7px 18px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue-dim); }
    .filter-btn.active { border-color: var(--blue); color: var(--blue-dark); background: var(--blue-lt); }

    .editorial-group { display: grid; grid-template-columns: 1.55fr 1fr; gap: 3px; margin-bottom: 3px; }
    .editorial-group .work-card:first-child { grid-row: 1 / 3; }
    .works-grid-small { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }

    .work-card { background: var(--bg-card); cursor: pointer; opacity: 0; animation: fadeUp 0.48s forwards; transition: box-shadow 0.25s; position: relative; overflow: hidden; }
    .work-card:hover { box-shadow: 0 6px 28px rgba(122,174,214,0.14); z-index: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .card-thumb { position: relative; overflow: hidden; background: #e8e4da; }
    .work-card.card-big .card-thumb { aspect-ratio: 16/10; }
    .work-card.card-small .card-thumb { aspect-ratio: 4/3; }
    .work-card.card-reg .card-thumb { aspect-ratio: 16/9; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .work-card:hover .card-thumb img { transform: scale(1.04); }
    .card-overlay { position: absolute; inset: 0; background: rgba(122,174,214,0.13); opacity: 0; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; }
    .work-card:hover .card-overlay { opacity: 1; }
    .play-ring { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.9); background: rgba(122,174,214,0.3); display: flex; align-items: center; justify-content: center; }
    .card-placeholder { width: 100%; height: 100%; min-height: 160px; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 1rem; font-style: italic; color: #ccc8bf; }
    .card-body { padding: 18px 22px 22px; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .card-cat { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--blue-dim); background: var(--blue-lt); padding: 3px 9px; }
    .card-year { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.1em; color: var(--text-muted); }
    .card-title { font-family: var(--font-serif); font-size: 1.05rem; font-weight: 400; color: var(--text); line-height: 1.35; margin-bottom: 8px; }
    .card-desc-preview { font-size: 0.78rem; line-height: 1.7; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-small .card-desc-preview { display: none; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .card-view { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue-dim); transition: transform 0.2s; }
    .work-card:hover .card-view { transform: translateX(4px); }
    .card-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue-lt); border: 1px solid var(--blue); }

    .shorts-section { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .shorts-inner { max-width: 1080px; margin: 0 auto; padding: 56px 60px 64px; }
    .shorts-desc { font-size: 0.82rem; line-height: 1.8; color: var(--text-muted); margin-bottom: 36px; max-width: 480px; }
    .shorts-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
    .short-card { cursor: pointer; opacity: 0; animation: fadeUp 0.4s forwards; }
    .short-thumb { aspect-ratio: 1/1; overflow: hidden; background: #e8e4da; position: relative; }
    .short-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .short-card:hover .short-thumb img { transform: scale(1.06); }
    .short-overlay { position: absolute; inset: 0; background: rgba(42,74,98,0.35); opacity: 0; transition: opacity 0.25s; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
    .short-card:hover .short-overlay { opacity: 1; }
    .short-label { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.9); }
    .short-title { padding: 10px 4px 4px; font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.04em; color: var(--text-muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .short-card.coming { cursor: default; }
    .short-card.coming .short-thumb { border: 1.5px dashed var(--border); background: transparent; }
    .short-coming-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
    .short-coming-plus { font-size: 1.2rem; color: var(--border); }
    .short-coming-text { font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--border); }

    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(28,28,26,0.55); z-index: 200; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(8px); }
    .modal-backdrop.open { display: flex; animation: mfade 0.2s; }
    @keyframes mfade { from { opacity: 0; } to { opacity: 1; } }
    .modal-box { background: var(--bg-card); max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid var(--border); animation: mslide 0.26s cubic-bezier(0.25,0.46,0.45,0.94); }
    @keyframes mslide { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-close { position: absolute; top: 14px; right: 14px; z-index: 10; width: 34px; height: 34px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, color 0.2s; }
    .modal-close:hover { border-color: var(--blue); color: var(--blue-dim); }
    .modal-media { aspect-ratio: 16/9; background: #e8e4da; overflow: hidden; position: relative; }
    .modal-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-media iframe { display: block; width: 100%; height: 100%; border: none; }
    .modal-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 1.5rem; font-style: italic; color: #ccc; }
    .mbig-play { position: absolute; inset: 0; margin: auto; width: 62px; height: 62px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.85); background: rgba(122,174,214,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .mbig-play:hover { transform: scale(1.08); background: var(--blue); }
    .modal-info { padding: 28px 32px 36px; }
    .modal-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .modal-tag { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--blue-dark); background: var(--blue-lt); padding: 4px 10px; }
    .modal-yr { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.12em; color: var(--text-muted); }
    .modal-title { font-family: var(--font-serif); font-size: 1.7rem; font-weight: 400; line-height: 1.2; margin-bottom: 14px; color: var(--text); }
    .modal-divider { height: 1px; background: var(--border); margin-bottom: 18px; }
    .modal-desc { font-size: 0.85rem; line-height: 2; color: var(--text-mid); margin-bottom: 22px; }
    .modal-yt-link { font-family: var(--font-mono); font-size: 0.64rem; letter-spacing: 0.1em; color: var(--blue-dim); text-decoration: none; border-bottom: 1px solid var(--blue-lt); padding-bottom: 2px; transition: border-color 0.2s, color 0.2s; }
    .modal-yt-link:hover { border-color: var(--blue); color: var(--blue-dark); }

    footer { border-top: 1px solid var(--border); max-width: 1080px; margin: 0 auto; padding: 36px 60px; display: flex; align-items: center; justify-content: space-between; }

    .footer-logo span { color: var(--blue-dim); }
    .footer-name { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.14em; color: var(--text-muted); margin-top: 4px; }
    .footer-mail a { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.08em; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .footer-mail a:hover { color: var(--blue-dim); }

    @media (max-width: 860px) {
      .editorial-group { grid-template-columns: 1fr; }
      .editorial-group .work-card:first-child { grid-row: auto; }
      .works-grid-small { grid-template-columns: repeat(2, 1fr); }
      .shorts-grid { grid-template-columns: repeat(3, 1fr); }
      .hero-bottom { flex-direction: column; gap: 28px; }
      .hero-stats { justify-content: flex-start; }
      .stat { text-align: left; }
    }
    @media (max-width: 600px) {
      nav { padding: 0 24px; }

      .works-grid-small { grid-template-columns: 1fr; }

    }
  </style>
</head>

    description: "에스콰이어 화보 촬영 현장 비하인드 영상입니다.",
    youtube: "https://youtu.be/w2AGXcoZQSo",
    image: "",
  },
  {
    id: 12,
    title: "약한영웅 모음 비하인드",
    category: "Behind",
    year: "2022",
    description: "드라마 '약한영웅' 촬영 현장의 다양한 비하인드 장면들을 모아 담은 영상입니다.",
    youtube: "https://youtu.be/CzeuBXSrpnE",
    image: "",
  },
  {
    id: 13,
    title: "'Blank Effect (무표정)' M/V 비하인드",
    category: "Behind",
    year: "2022",
    description: "박지훈 'Blank Effect (무표정)' 뮤직비디오 촬영 현장 비하인드 영상입니다.",
    youtube: "https://youtu.be/EPS9kYGlJCk",
    image: "",
  },
];

const SHORTS = [
  // 나중에 여기에 추가하세요
  // { id: 1, title: "클립 제목", year: "2024", link: "", image: "" },
];
// ================================================================

function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function thumb(work) {
  if (work.image) return work.image;
  const id = ytId(work.youtube || work.link || "");
  return id ? `https://img.youtube.com/vi/${id}/maxresdefault.jpg` : null;
}

let active = "All";
const cats = ["All", "Directed", "Behind"];
document.getElementById("stat-total").textContent = WORKS.length;

function renderFilters() {
  document.getElementById("filter-bar").innerHTML = cats.map(c =>
    `<button class="filter-btn${c===active?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join("");
}
function setFilter(c) { active = c; renderFilters(); renderWorks(); }

function renderWorks() {
  const list = active === "All" ? WORKS : WORKS.filter(w => w.category === active);
  document.getElementById("work-count").textContent = list.length + " projects";
  let html = "";
  if (list.length === 0) {
    html = `<p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);padding:40px 0;">No projects in this category.</p>`;
  } else if (list.length === 1) {
    html = `<div class="works-grid-small">${cardHTML(list[0], 0, 'card-reg')}</div>`;
  } else {
    const big = list[0];
    const smalls = list.slice(1, 3);
    const rest = list.slice(3);
    html += `<div class="editorial-group">`;
    html += cardHTML(big, 0, 'card-big');
    smalls.forEach((w, i) => { html += cardHTML(w, i+1, 'card-small'); });
    html += `</div>`;
    if (rest.length > 0) {
      html += `<div class="works-grid-small">`;
      rest.forEach((w, i) => { html += cardHTML(w, i+3, 'card-reg'); });
      html += `</div>`;
    }
  }
  document.getElementById("works-container").innerHTML = html;
}

function cardHTML(w, i, sizeClass) {
  const t = thumb(w);
  return `
  <div class="work-card ${sizeClass}" style="animation-delay:${i*0.06}s" onclick="openModal(${w.id})">
    <div class="card-thumb">
      ${t ? `<img src="${t}" alt="${w.title}" loading="lazy">` : `<div class="card-placeholder">${w.category}</div>`}
      <div class="card-overlay">
        <div class="play-ring"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-cat">${w.category}</span>
        <span class="card-year">${w.year}</span>
      </div>
      <div class="card-title">${w.title}</div>
      <div class="card-desc-preview">${w.description}</div>
      <div class="card-footer">
        <span class="card-view">View →</span>
        <span class="card-dot"></span>
      </div>
    </div>
  </div>`;
}

function renderShorts() {
  const SLOTS = 5;
  document.getElementById("shorts-count").textContent = SHORTS.length + " clips";
  let html = "";
  SHORTS.forEach((s, i) => {
    const t = thumb(s);
    html += `
    <div class="short-card" style="animation-delay:${i*0.06}s" ${s.link ? `onclick="window.open('${s.link}','_blank')"` : ''}>
      <div class="short-thumb">
        ${t ? `<img src="${t}" alt="${s.title}" loading="lazy"><div class="short-overlay"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg><span class="short-label">재생</span></div>` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.6rem;color:#ccc8bf;">Soon</div>`}
      </div>
      <div class="short-title">${s.title}</div>
    </div>`;
  });
  for (let j = SHORTS.length; j < SLOTS; j++) {
    html += `
    <div class="short-card coming">
      <div class="short-thumb"><div class="short-coming-inner"><span class="short-coming-plus">+</span><span class="short-coming-text">Soon</span></div></div>
      <div class="short-title" style="color:var(--border);">—</div>
    </div>`;
  }
  document.getElementById("shorts-grid").innerHTML = html;
}

function openModal(id) {
  const w = WORKS.find(x => x.id === id);
  if (!w) return;
  const vid = ytId(w.youtube || "");
  const t = thumb(w);
  document.getElementById("modal-cat").textContent = w.category;
  document.getElementById("modal-year").textContent = w.year;
  document.getElementById("modal-title").textContent = w.title;
  document.getElementById("modal-desc").textContent = w.description;
  document.getElementById("modal-link").innerHTML = w.youtube
    ? `<a href="${w.youtube}" target="_blank" rel="noopener" class="modal-yt-link">YouTube에서 보기 →</a>` : "";
  const media = document.getElementById("modal-media");
  if (t) {
    media.innerHTML = `<img src="${t}" alt="${w.title}">${vid ? `<button class="mbig-play" onclick="playVid('${vid}')"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>` : ''}`;
  } else {
    media.innerHTML = `<div class="modal-ph">${w.category}</div>`;
  }
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function playVid(id) {
  document.getElementById("modal-media").innerHTML =
    `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modal-media").innerHTML = "";
  document.body.style.overflow = "";
}
document.getElementById("modal").addEventListener("click", e => { if (e.target === document.getElementById("modal")) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

renderFilters();
renderWorks();
renderShorts();
</script>
